<!DOCTYPE html>
<html lang="vi">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 C&C Locket Remote</title>
</head>
<body style="background:#121212; color:#fff; font-family:sans-serif; padding:20px; text-align:center;">
    <h2 style="color:#00e676;">🎯 Bắn Lệnh Vệ Tinh</h2>
    <p style="font-size:13px; color:#aaa;">Nhập Username, Link locket.cam hoặc Link Invite:</p>
    
    <input type="text" id="linkInput" style="width:100%; padding:15px; box-sizing:border-box; border-radius:8px; border:1px solid #333; background:#222; color:#fff; margin-bottom:15px; font-size:15px;" placeholder="@isaac.lion hoặc dán link...">
    
    <button onclick="sendTarget()" style="width:100%; padding:15px; background:#2481cc; color:white; font-weight:bold; border:none; border-radius:8px; font-size:16px;">🚀 KHAI HỎA PC</button>
    
    <div id="msg" style="margin-top:20px; font-size:14px; font-weight:bold;"></div>
    
    <script>
        async function sendTarget() {
            const rawInput = document.getElementById('linkInput').value.trim();
            const msg = document.getElementById('msg');
            
            if (!rawInput) return msg.innerHTML = '<span style="color:#ff4444;">❌ Vui lòng nhập thông tin!</span>';
            msg.innerHTML = '<span style="color:#FFD700;">⏳ Đang truyền lệnh về PC...</span>';
            
            // Tạo một ID tạm thời (Ví dụ: cmd_1678129381)
            const tempId = "cmd_" + Date.now();
            const FIREBASE_URL = `https://locket-tool-api-default-rtdb.asia-southeast1.firebasedatabase.app/celebs/${tempId}.json`;
            
            try {
                // Đẩy chuỗi gốc (rawInput) lên cho PC tự nhai
                await fetch(FIREBASE_URL, { 
                    method: 'PUT', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ isRawCommand: true, rawInput: rawInput }) 
                });
                msg.innerHTML = `<span style="color:#00e676;">✅ Đã bắn lệnh! PC đang tự động phân tích và khai hỏa!</span>`;
                document.getElementById('linkInput').value = ""; 
            } catch(e) { 
                msg.innerHTML = '<span style="color:#ff4444;">❌ Lỗi mạng: ' + e.message + '</span>'; 
            }
        }
    </script>
</body>
</html>
